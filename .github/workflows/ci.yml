name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # ── Python lint ───────────────────────────────────────────────────────────
  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check scripts/ app/

  # ── Java build ────────────────────────────────────────────────────────────
  java-build:
    name: Java build (Maven -DskipTests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Build yoga-api
        run: cd yoga-api && ./mvnw -q package -DskipTests

  # ── JSON schema validation ────────────────────────────────────────────────
  validate-schemas:
    name: Validate JSON schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install jsonschema
      - run: |
          python -c "
          import json, jsonschema
          schema = json.load(open('schemas/pose_eat_schema.json'))
          print('Schema valid:', schema.get('@type', schema.get('title', 'OK')))
          "

  # ── Agent smoke test (import-only, no live DB/Ollama needed) ─────────────
  agent-smoke-test:
    name: Agent pipeline import smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core API deps
        run: pip install -r requirements.txt -r requirements-api.txt --no-deps 2>/dev/null || pip install fastapi httpx pydantic-settings langgraph langchain-core
      - name: Smoke test — LangGraph build_graph
        run: |
          python -c "
          from app.agents.graph import build_graph, AgentState
          g = build_graph()
          print('LangGraph OK — nodes:', list(g.get_graph().nodes.keys()))
          "
      - name: Smoke test — CrewAI imports
        run: |
          python -c "
          from app.agents.crew import _time_context, _district_hint, _template_copy
          ctx = _time_context()
          hint = _district_hint(37.4979, 127.0276)
          ko, en = _template_copy({'lat': 37.4979, 'lng': 127.0276, 'top_poses': [], 'top_studio': None})
          print('CrewAI template OK:', ko[:40])
          "
      - name: Smoke test — Geofence check
        run: |
          python -c "
          from app.agents.geofence import check_geofence
          studios = [{'name': '강남 요가 센터', 'latitude': 37.4979, 'longitude': 127.0276}]
          t = check_geofence(37.4982, 127.0280, studios)
          assert t is not None and t.zone_type == 'partner', f'Expected partner trigger, got {t}'
          print('Geofence OK — trigger:', t.zone_type, t.distance_m, 'm')
          "
