spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/yogadb
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8080
springdoc:
  api-docs:
    path: /api/v1/openapi.json
