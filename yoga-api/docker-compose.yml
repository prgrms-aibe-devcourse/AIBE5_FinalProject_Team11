version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yogadb
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
    ports:
      - "8879:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  yoga-api:
    build: .
    ports:
      - "19090:8080"
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/yogadb
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:18-slim
    working_dir: /app
    volumes:
      - ../frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && node node_modules/.bin/vite --host 0.0.0.0 --port 5173"
    environment:
      DOCKER_HOST: host.docker.internal
    # hot-reload proxy targets inside Docker network
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
