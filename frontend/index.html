<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elbee Yoga Guide</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧘</text></svg>" />
    <!-- Schema.org FAQPage — static for pre-JS crawlers (Googlebot, Perplexity, SearchGPT) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does Elbee match yoga poses to my health goals?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Elbee uses a benefit-scoring algorithm that maps your selected goals (e.g. Spinal Mobility, Hip Flexibility) to benefit tags stored for every pose. Each goal expands into related tags — for example, Back Pain Relief maps to back, relief, posture, and release. Poses are ranked by the weighted sum of matching tags, so the pose most aligned with your goals appears first."
          }
        },
        {
          "@type": "Question",
          "name": "What is the Kill-Switch filter in yoga pose matching?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Kill-Switch filter automatically removes poses that are contraindicated for a reported health condition. If you flag knee injury, Lotus Pose (Padmasana) is removed from your results entirely — regardless of its score — because it carries a HIGH-severity contraindication with kill_switch=true. This prevents recommending poses that could cause harm."
          }
        },
        {
          "@type": "Question",
          "name": "What health flags does Elbee support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Elbee currently supports six health flags: knee_injury, pregnancy, high_blood_pressure, wrist_injury, lower_back_pain, and neck_injury. Each flag triggers kill-switch or severity-weighted filtering across the pose database. You can select multiple flags; all active kill-switches are applied before scoring."
          }
        },
        {
          "@type": "Question",
          "name": "How is an instructor trust score calculated?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The instructor trust score (0.0–1.0) combines four signals: certification weight (RYT-200=0.4, RYT-500=0.6, E-RYT-200=0.8, E-RYT-500=1.0), review weight (average rating ÷ 5 × 0.3), lineage depth weight (generations × 0.05, capped at 0.2), and social proof weight (log₁₀(Instagram followers) ÷ 7, capped at 0.1). The score is recalculated daily."
          }
        },
        {
          "@type": "Question",
          "name": "What does FYT100 certification mean?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "FYT100 refers to the 100-hour certification issued by Find Your Trainer (FYT), covering anatomy, sequencing, and teaching methodology. It is recognised as an entry-level professional yoga teaching qualification. Elbee instructors hold FYT100, FYT200, or Yoga Alliance credentials."
          }
        },
        {
          "@type": "Question",
          "name": "What yoga pose is best for lower back pain relief?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "For lower back pain relief, Elbee typically surfaces Child's Pose (Balasana), Cat-Cow Stretch (Marjaryasana-Bitilasana), Supine Twist (Supta Matsyendrasana), and Seated Forward Fold (Paschimottanasana). These poses carry high benefit weights for the back, relief, and release tags. Always consult a qualified instructor before starting if you have a diagnosed condition."
          }
        },
        {
          "@type": "Question",
          "name": "Can I access the Elbee yoga matching API directly?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The matching endpoint is POST /api/v1/match. Send a JSON body with healthFlags (array of condition strings), goals (array such as Spinal_Mobility or Core_Strength), and topK (maximum results, default 10). The response includes each pose's name, difficulty rank (1–5), match score, and a plain-language description."
          }
        }
      ]
    }
    </script>
    <!-- Schema.org WebSite — enables Sitelinks Searchbox in Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Elbee Yoga Guide",
      "url": "https://yogaman.club",
      "description": "AI-powered yoga pose matching, instructor trust scoring, and studio discovery. Built on E-E-A-T principles for Perplexity, SearchGPT, and Gemini visibility.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://yogaman.club/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
