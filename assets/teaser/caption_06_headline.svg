<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#1c2128"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Headline (Korean) -->
  <text x="960" y="380" text-anchor="middle"
        font-family="Pretendard, Apple SD Gothic Neo, sans-serif"
        font-size="148" font-weight="800" fill="#ffffff"
        letter-spacing="-2">가까운 곳보다,</text>
  <text x="960" y="560" text-anchor="middle"
        font-family="Pretendard, Apple SD Gothic Neo, sans-serif"
        font-size="148" font-weight="800" fill="#79c0ff"
        letter-spacing="-2">맞는 곳.</text>

  <!-- English subtitle -->
  <text x="960" y="700" text-anchor="middle"
        font-family="Inter, -apple-system, sans-serif"
        font-size="36" font-weight="400" fill="#8b949e"
        letter-spacing="2">Not the closest. The right one.</text>

  <!-- Brand mark -->
  <text x="960" y="980" text-anchor="middle"
        font-family="Inter, sans-serif"
        font-size="22" font-weight="600" fill="#6e7681"
        letter-spacing="6">AEOGEO</text>
</svg>
