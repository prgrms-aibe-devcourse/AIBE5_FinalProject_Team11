<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Logo mark -->
  <g transform="translate(960, 360)">
    <circle r="80" fill="none" stroke="#79c0ff" stroke-width="3"/>
    <circle r="50" fill="none" stroke="#79c0ff" stroke-width="2" opacity="0.6"/>
    <circle r="20" fill="#79c0ff"/>
  </g>

  <!-- Wordmark -->
  <text x="960" y="560" text-anchor="middle"
        font-family="Inter, sans-serif"
        font-size="112" font-weight="800" fill="#ffffff"
        letter-spacing="6">aeogeo</text>

  <!-- URL -->
  <text x="960" y="630" text-anchor="middle"
        font-family="JetBrains Mono, monospace"
        font-size="28" fill="#8b949e"
        letter-spacing="3">aeogeo.app</text>

  <!-- CTA pill -->
  <g transform="translate(960, 760)">
    <rect x="-260" y="-40" width="520" height="80" rx="40" fill="#238636"/>
    <text x="0" y="10" text-anchor="middle"
          font-family="Pretendard, sans-serif"
          font-size="32" font-weight="700" fill="#ffffff">투자 미팅 요청 →</text>
  </g>

  <text x="960" y="880" text-anchor="middle"
        font-family="Inter, sans-serif"
        font-size="22" fill="#6e7681">Request investor meeting</text>

  <!-- Tagline -->
  <text x="960" y="980" text-anchor="middle"
        font-family="Pretendard, sans-serif"
        font-size="20" fill="#6e7681" letter-spacing="2"
        font-style="italic">Instructor knowledge × AI orchestration</text>
</svg>
