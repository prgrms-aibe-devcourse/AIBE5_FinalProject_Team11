# ──────────────────────────────────────────────────────────────────────────────
# aeogeo — persistent application services
#
# Services managed here:
#   frontend        — Vite + React dev server  :5173
#   streamlit-safety — AEO Safety Filter demo  :8501
#   streamlit-match  — Studio Match Score demo  :8502
#
# FastAPI is handled by the rag_pipeline compose stack
#   (yoga-chat-api :5002, yoga-search-api :5001) — do NOT duplicate here.
#
# Caddy reverse proxy is managed separately in docker-compose.caddy.yml.
#
# Usage:
#   First build:   docker compose build
#   Start:         docker compose up -d
#   Restart:       docker compose restart
#   Logs:          docker compose logs -f
# ──────────────────────────────────────────────────────────────────────────────
name: aeogeo

services:

  # ── Vite + React frontend ──────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: aeogeo-frontend
    # Tell vite.config.js to proxy through host.docker.internal so it can
    # reach yoga-chat-api (:5002) and yoga-search-api (:5001) on the host.
    environment:
      DOCKER_HOST: host.docker.internal
      CHAT_PORT: "5002"
      SEARCH_PORT: "5001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5173:5173"
    restart: unless-stopped

  # ── Streamlit: AEO Safety Filter demo ─────────────────────────────────────
  streamlit-safety:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: aeogeo-st-safety
    command: >
      streamlit run scripts/demo_safety_filter.py
      --server.port 8501
      --server.headless true
      --server.address 0.0.0.0
    ports:
      - "8501:8501"
    restart: unless-stopped

  # ── Streamlit: Studio Match Score demo ────────────────────────────────────
  streamlit-match:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: aeogeo-st-match
    command: >
      streamlit run scripts/demo_match_score.py
      --server.port 8502
      --server.headless true
      --server.address 0.0.0.0
      --server.baseUrlPath /match
    ports:
      - "8502:8502"
    restart: unless-stopped
